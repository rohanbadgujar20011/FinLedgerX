server:
  port: 8081
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 5000

spring:
  application:
    name: payment-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  # ── PostgreSQL ────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/payments_db
    username: payments_user
    password: payments_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name:            PaymentHikariPool
      maximum-pool-size:    10
      minimum-idle:         2
      connection-timeout:   20000
      idle-timeout:         300000
      max-lifetime:         1200000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  # ── JPA ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect:               org.hibernate.dialect.PostgreSQLDialect
        default_schema:        public
        jdbc.batch_size:       50
        order_inserts:         true
        order_updates:         true
        format_sql:            false

  # ── Flyway ────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Kafka ─────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9093
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence:                          true
        max.in.flight.requests.per.connection:       1
        linger.ms:                                   5
        compression.type:                            snappy
        delivery.timeout.ms:                         120000

  # ── Redis ─────────────────────────────────────────────────────
  data:
    redis:
      host:     localhost
      port:     6379
      password: redis_pass
      timeout:  2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle:   10
          min-idle:   2
          max-wait:   200ms

  # ── Jackson ───────────────────────────────────────────────────
  jackson:
    default-property-inclusion: NON_NULL
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

# ── Actuator / Management ──────────────────────────────────────
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: local

# ── Logging ────────────────────────────────────────────────────
logging:
  level:
    root:                                INFO
    com.finledgerx.payment:              DEBUG
    org.springframework.kafka:           WARN
    org.hibernate.SQL:                   WARN
    org.flywaydb:                        INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

# ── FinLedgerX custom properties ───────────────────────────────
finledgerx:
  payment:
    outbox-poll-delay-ms:  500
    outbox-batch-size:     100
  idempotency:
    ttl-hours:             24
  redis:
    lock:
      account-debit-ttl-ms: 10000
      payment-ttl-ms:       30000
      wait-ms:              5000
