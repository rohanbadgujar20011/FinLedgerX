version: "3.9"

# ============================================================
# FinLedgerX — Docker Compose
# Run: docker compose up -d
# Stop: docker compose down -v   (removes volumes too)
# ============================================================

networks:
  # ── Frontend: UI + API gateway exposed to host
  finledgerx-frontend:
    driver: bridge
    name: finledgerx-frontend

  # ── Backend: all services + infra; internal only
  finledgerx-backend:
    driver: bridge
    name: finledgerx-backend
    internal: false          # set true in prod; false for local debugging

  # ── Data: databases + Redis; services connect here
  finledgerx-data:
    driver: bridge
    name: finledgerx-data

  # ── Monitoring: Prometheus + Grafana
  finledgerx-monitoring:
    driver: bridge
    name: finledgerx-monitoring

volumes:
  payments-db-data:
    name: finledgerx-payments-db-data
  ledger-db-data:
    name: finledgerx-ledger-db-data
  notifications-db-data:
    name: finledgerx-notifications-db-data
  reconciliation-db-data:
    name: finledgerx-reconciliation-db-data
  zookeeper-data:
    name: finledgerx-zookeeper-data
  zookeeper-log:
    name: finledgerx-zookeeper-log
  kafka-data:
    name: finledgerx-kafka-data
  redis-data:
    name: finledgerx-redis-data
  prometheus-data:
    name: finledgerx-prometheus-data
  grafana-data:
    name: finledgerx-grafana-data

# ============================================================
# WAVE 1 — DATA TIER (starts first)
# ============================================================
services:

  # ── PostgreSQL: payments_db ──────────────────────────────
  payments-db:
    image: postgres:16-alpine
    container_name: finledgerx-payments-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PAYMENTS_DB_NAME:-payments_db}
      POSTGRES_USER:     ${PAYMENTS_DB_USER:-payments_user}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD:-payments_pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/payments/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${PAYMENTS_DB_HOST_PORT:-5433}:5432"
    networks:
      - finledgerx-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENTS_DB_USER:-payments_user} -d ${PAYMENTS_DB_NAME:-payments_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── PostgreSQL: ledger_db ────────────────────────────────
  ledger-db:
    image: postgres:16-alpine
    container_name: finledgerx-ledger-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${LEDGER_DB_NAME:-ledger_db}
      POSTGRES_USER:     ${LEDGER_DB_USER:-ledger_user}
      POSTGRES_PASSWORD: ${LEDGER_DB_PASSWORD:-ledger_pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ledger-db-data:/var/lib/postgresql/data
      - ./infra/postgres/ledger/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${LEDGER_DB_HOST_PORT:-5433}:5432"
    networks:
      - finledgerx-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LEDGER_DB_USER:-ledger_user} -d ${LEDGER_DB_NAME:-ledger_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── PostgreSQL: notifications_db ─────────────────────────
  notifications-db:
    image: postgres:16-alpine
    container_name: finledgerx-notifications-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${NOTIFICATIONS_DB_NAME:-notifications_db}
      POSTGRES_USER:     ${NOTIFICATIONS_DB_USER:-notif_user}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD:-notif_pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - notifications-db-data:/var/lib/postgresql/data
      - ./infra/postgres/notifications/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${NOTIFICATIONS_DB_HOST_PORT:-5434}:5432"
    networks:
      - finledgerx-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_DB_USER:-notif_user} -d ${NOTIFICATIONS_DB_NAME:-notifications_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── PostgreSQL: reconciliation_db ────────────────────────
  reconciliation-db:
    image: postgres:16-alpine
    container_name: finledgerx-reconciliation-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${RECONCILIATION_DB_NAME:-reconciliation_db}
      POSTGRES_USER:     ${RECONCILIATION_DB_USER:-recon_user}
      POSTGRES_PASSWORD: ${RECONCILIATION_DB_PASSWORD:-recon_pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - reconciliation-db-data:/var/lib/postgresql/data
      - ./infra/postgres/reconciliation/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${RECONCILIATION_DB_HOST_PORT:-5435}:5432"
    networks:
      - finledgerx-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RECONCILIATION_DB_USER:-recon_user} -d ${RECONCILIATION_DB_NAME:-reconciliation_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finledgerx-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-redis_pass}
      --loglevel notice
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - finledgerx-data
      - finledgerx-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 320m
          cpus: "0.25"

  # ============================================================
  # WAVE 2 — MESSAGING TIER
  # ============================================================

  # ── Zookeeper ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: finledgerx-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT:  2181
      ZOOKEEPER_TICK_TIME:    2000
      ZOOKEEPER_SYNC_LIMIT:   2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - finledgerx-backend
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | bash -c 'cat > /dev/tcp/localhost/2181' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finledgerx-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS:              1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "false"
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_LOG_SEGMENT_BYTES:                1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS:  300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT:                         9999
      KAFKA_JMX_HOSTNAME:                     kafka
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
      - "9093:9093"      # PLAINTEXT_HOST for local tools (Offset Explorer, etc.)
      - "9999:9999"      # JMX
    networks:
      - finledgerx-backend
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Schema Registry ──────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: finledgerx-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME:              schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS:              http://0.0.0.0:8081
    ports:
      - "${SCHEMA_REGISTRY_HOST_PORT:-8085}:8081"
    networks:
      - finledgerx-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # WAVE 3 — KAFKA TOPIC INIT (one-shot)
  # ============================================================

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finledgerx-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"          # exits 0 after creating topics — never restarts
    networks:
      - finledgerx-backend
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be fully ready..."
        sleep 5

        create_topic() {
          kafka-topics --bootstrap-server kafka:9092 \
            --create --if-not-exists \
            --topic $$1 --partitions $$2 --replication-factor 1 \
            --config retention.ms=$$3
          echo "  ✓ $$1"
        }

        echo "Creating core topics..."
        create_topic "payment.events"         3   604800000
        create_topic "ledger.entries"         3   2592000000
        create_topic "notification.events"    3   259200000
        create_topic "reconciliation.events"  1   2592000000

        echo "Creating retry topics..."
        create_topic "payment.events.retry-1"       1  604800000
        create_topic "payment.events.retry-2"       1  604800000
        create_topic "payment.events.retry-3"       1  604800000
        create_topic "ledger.entries.retry-1"       1  604800000
        create_topic "ledger.entries.retry-2"       1  604800000
        create_topic "notification.events.retry-1"  1  604800000
        create_topic "reconciliation.events.retry-1" 1 604800000

        echo "Creating DLQ topics..."
        create_topic "payment.events.dlq"          1  7776000000
        create_topic "ledger.entries.dlq"          1  7776000000
        create_topic "notification.events.dlq"     1  7776000000
        create_topic "reconciliation.events.dlq"   1  7776000000

        echo "All topics created successfully."
        kafka-topics --bootstrap-server kafka:9092 --list

  # ============================================================
  # WAVE 4 — MICROSERVICES
  # ============================================================

  # ── Payment Service ──────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
      target: runtime
    image: finledgerx/payment-service:${APP_VERSION:-latest}
    container_name: finledgerx-payment-service
    restart: unless-stopped
    depends_on:
      payments-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE:                  docker
      SERVER_PORT:                             8081
      SPRING_DATASOURCE_URL:                   jdbc:postgresql://payments-db:5432/${PAYMENTS_DB_NAME:-payments_db}
      SPRING_DATASOURCE_USERNAME:              ${PAYMENTS_DB_USER:-payments_user}
      SPRING_DATASOURCE_PASSWORD:              ${PAYMENTS_DB_PASSWORD:-payments_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:          kafka:9092
      SPRING_REDIS_HOST:                       redis
      SPRING_REDIS_PORT:                       6379
      SPRING_REDIS_PASSWORD:                   ${REDIS_PASSWORD:-redis_pass}
      MANAGEMENT_SERVER_PORT:                  9090
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      JAVA_OPTS:                               >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "${PAYMENT_SERVICE_HOST_PORT:-8081}:8081"
      - "9101:9090"
    networks:
      - finledgerx-backend
      - finledgerx-data
      - finledgerx-monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Ledger Service ───────────────────────────────────────
  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
      target: runtime
    image: finledgerx/ledger-service:${APP_VERSION:-latest}
    container_name: finledgerx-ledger-service
    restart: unless-stopped
    depends_on:
      ledger-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE:                  docker
      SERVER_PORT:                             8082
      SPRING_DATASOURCE_URL:                   jdbc:postgresql://ledger-db:5432/${LEDGER_DB_NAME:-ledger_db}
      SPRING_DATASOURCE_USERNAME:              ${LEDGER_DB_USER:-ledger_user}
      SPRING_DATASOURCE_PASSWORD:              ${LEDGER_DB_PASSWORD:-ledger_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:          kafka:9092
      SPRING_REDIS_HOST:                       redis
      SPRING_REDIS_PORT:                       6379
      SPRING_REDIS_PASSWORD:                   ${REDIS_PASSWORD:-redis_pass}
      MANAGEMENT_SERVER_PORT:                  9090
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      JAVA_OPTS:                               >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "${LEDGER_SERVICE_HOST_PORT:-8082}:8082"
      - "9102:9090"
    networks:
      - finledgerx-backend
      - finledgerx-data
      - finledgerx-monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Notification Service ─────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
      target: runtime
    image: finledgerx/notification-service:${APP_VERSION:-latest}
    container_name: finledgerx-notification-service
    restart: unless-stopped
    depends_on:
      notifications-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE:                  docker
      SERVER_PORT:                             8083
      SPRING_DATASOURCE_URL:                   jdbc:postgresql://notifications-db:5432/${NOTIFICATIONS_DB_NAME:-notifications_db}
      SPRING_DATASOURCE_USERNAME:              ${NOTIFICATIONS_DB_USER:-notif_user}
      SPRING_DATASOURCE_PASSWORD:              ${NOTIFICATIONS_DB_PASSWORD:-notif_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:          kafka:9092
      MAIL_HOST:                               ${MAIL_HOST:-mailhog}
      MAIL_PORT:                               ${MAIL_PORT:-1025}
      MANAGEMENT_SERVER_PORT:                  9090
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      JAVA_OPTS:                               >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT:-8083}:8083"
      - "9103:9090"
    networks:
      - finledgerx-backend
      - finledgerx-data
      - finledgerx-monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Reconciliation Service ───────────────────────────────
  reconciliation-service:
    build:
      context: ./reconciliation-service
      dockerfile: Dockerfile
      target: runtime
    image: finledgerx/reconciliation-service:${APP_VERSION:-latest}
    container_name: finledgerx-reconciliation-service
    restart: unless-stopped
    depends_on:
      reconciliation-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE:                  docker
      SERVER_PORT:                             8084
      SPRING_DATASOURCE_URL:                   jdbc:postgresql://reconciliation-db:5432/${RECONCILIATION_DB_NAME:-reconciliation_db}
      SPRING_DATASOURCE_USERNAME:              ${RECONCILIATION_DB_USER:-recon_user}
      SPRING_DATASOURCE_PASSWORD:              ${RECONCILIATION_DB_PASSWORD:-recon_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:          kafka:9092
      SPRING_REDIS_HOST:                       redis
      SPRING_REDIS_PORT:                       6379
      SPRING_REDIS_PASSWORD:                   ${REDIS_PASSWORD:-redis_pass}
      MANAGEMENT_SERVER_PORT:                  9090
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      JAVA_OPTS:                               >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
    ports:
      - "${RECONCILIATION_SERVICE_HOST_PORT:-8084}:8084"
      - "9104:9090"
    networks:
      - finledgerx-backend
      - finledgerx-data
      - finledgerx-monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================
  # WAVE 5 — FRONTEND
  # ============================================================

  # ── React UI ─────────────────────────────────────────────
  react-ui:
    build:
      context: ./react-ui
      dockerfile: Dockerfile
    image: finledgerx/react-ui:${APP_VERSION:-latest}
    container_name: finledgerx-react-ui
    restart: unless-stopped
    depends_on:
      payment-service:
        condition: service_healthy
    ports:
      - "${UI_HOST_PORT:-3001}:80"
    networks:
      - finledgerx-frontend
      - finledgerx-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  # ── MailHog (dev email catcher) ──────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: finledgerx-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - finledgerx-backend

  # ============================================================
  # WAVE 6 — OBSERVABILITY
  # ============================================================

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: finledgerx-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - finledgerx-monitoring
      - finledgerx-backend
    depends_on:
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: finledgerx-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:               ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:           ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_SERVER_ROOT_URL:                   http://localhost:3000
      GF_USERS_ALLOW_SIGN_UP:               "false"
      GF_ALERTING_ENABLED:                  "true"
      GF_UNIFIED_ALERTING_ENABLED:          "true"
      GF_INSTALL_PLUGINS:                   grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    networks:
      - finledgerx-monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
